---
- name: Install and configure RKE2 agents
  hosts: rke2_agents
  become: true
  vars:
    primary_server: "{{ groups['rke2_servers'][0] }}"
  tasks:
    - name: Install base packages
      package:
        name:
          - curl
          - tar
        state: present

    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Render agent config
      copy:
        dest: /etc/rancher/rke2/config.yaml
        mode: '0600'
        content: |
          server: https://{{ hostvars[primary_server].private_ip }}:9345
          node-name: "{{ inventory_hostname }}"
          token: {{ rke2_token }}
          cni: cilium
          node-label:
            - ingress-ready=true
          disable:
            - rke2-ingress-nginx

    - name: Ensure RKE2 sysctl settings are present
      copy:
        dest: /etc/sysctl.d/99-rke2.conf
        mode: '0644'
        content: |
          net.ipv4.ip_forward=1
          net.bridge.bridge-nf-call-iptables=1
          net.bridge.bridge-nf-call-ip6tables=1

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Disable NetworkManager cloud setup units required by RKE2
      systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop:
        - nm-cloud-setup.service
        - nm-cloud-setup.timer
      ignore_errors: true

    - name: Install RKE2
      shell: curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ rke2_version }} INSTALL_RKE2_TYPE=agent sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable RKE2 agent
      systemd:
        name: rke2-agent
        enabled: true
        state: started
